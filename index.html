<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PBL Semester Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="page-header">
    <h1>PBL Semester Planner</h1>
    <p class="subhead">Calendar‑first planning for Fall and Spring PBL implementation</p>
  </header>

  <main class="app">
    <!-- PBL ENTRY -->
    <section class="input-card">
      <h2>Add a PBL</h2>
      <form id="pblForm" class="input-grid">
        <input id="teacher" placeholder="Teacher name" required />
        <input id="course" placeholder="Course" required />
        <select id="term">
          <option value="fall">Fall</option>
          <option value="spring">Spring</option>
        </select>
        <input id="title" placeholder="PBL title" required />
        <input id="startDate" type="date" required />
        <input id="endDate" type="date" required />
        <button type="submit">Add PBL</button>
      </form>
    </section>

    <!-- CALENDAR -->
    <section class="calendar">
      <div class="calendar-toolbar">
        <select id="termFilter">
          <option value="fall">Fall</option>
          <option value="spring">Spring</option>
        </select>
        <select id="viewMode">
          <option value="admin">Admin view</option>
          <option value="teacher">Teacher view</option>
        </select>
        <input id="search" placeholder="Search title, course, teacher" />
      </div>

      <div class="month-header">
        <div>Aug</div><div>Sep</div><div>Oct</div><div>Nov</div><div>Dec</div>
      </div>

      <div id="timeline" class="timeline"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
