services:
  - type: web
    name: pbl-planner-live
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pbl-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: pbl-db
    plan: starter
